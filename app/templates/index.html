{% extends "base.html" %}

{% block title %}accntbl{% endblock %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center">
    <h1 class="h3">accntbl</h1>
    <div>
      <a href="{{ url_for('settings.index') }}" class="btn btn-outline-secondary btn-sm">Settings</a>
      <form method="post" action="{{ url_for('auth.logout') }}" class="d-inline">
        <button type="submit" class="btn btn-outline-secondary btn-sm">Log out</button>
      </form>
    </div>
  </div>

  <div id="transactions-window" data-today="{{ today }}" data-window-url="{{ url_for('transactions.window') }}" class="mt-3" style="max-height: 70vh; overflow-y: auto;">
    <table class="table table-sm align-middle mb-0">
      <thead class="sticky-top bg-white">
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th>Cash</th>
          <th>Credit</th>
          <th>Running total</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody id="transactions-tbody">
        <tr><td colspan="6" class="text-muted">Loading…</td></tr>
      </tbody>
    </table>
  </div>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='js/table.js') }}"></script>
{% endblock %}
